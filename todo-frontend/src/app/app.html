<div class="container">

  <div class="header">
    <h1>My To-Do List</h1>
    <p>Keep track of your tasks</p>
  </div>

  <div class="top-bar">
    <span>{{ todos.length }} task(s) total</span>
    <button class="btn btn-primary" (click)="showForm = !showForm">
      {{ showForm ? 'Cancel' : '+ Add Task' }}
    </button>
  </div>

  <!-- TASK FORM -->
  <div class="form-box" *ngIf="showForm">
    <h3>Add New Task</h3>

    <div class="form-group">
      <label>Title <span class="required">*</span></label>
      <input type="text" [(ngModel)]="newTitle" placeholder="Enter task title" [class.input-error]="titleError" />
      <small class="error-msg" *ngIf="titleError">{{ titleError }}</small>
    </div>

    <div class="form-group">
      <label>Description</label>
      <input type="text" [(ngModel)]="newDescription" placeholder="Enter description (optional)" />
    </div>

    <div class="form-group">
      <label>Due Date <span class="required">*</span></label>
      <input type="date" [(ngModel)]="newDueDate" [class.input-error]="dueDateError" />
      <small class="error-msg" *ngIf="dueDateError">{{ dueDateError }}</small>
    </div>

    <button class="btn btn-primary" (click)="addTodo()">Add Task</button>
  </div>

  <div class="task-list">
    <p class="empty-msg" *ngIf="todos.length === 0">No tasks yet. Add one above!</p>

    <div *ngFor="let todo of todos" class="task-card" [class.task-done]="todo.isCompleted">

      <ng-container *ngIf="editingId !== todo.id">
        <input type="checkbox" [checked]="todo.isCompleted" (change)="toggleComplete(todo)" class="checkbox" />
        <div class="task-info">
          <p class="task-title">{{ todo.title }}</p>
          <p class="task-desc" *ngIf="todo.description">{{ todo.description }}</p>
          <p class="task-date" *ngIf="todo.dueDate">Due: {{ todo.dueDate }}</p>
        </div>
        <div class="task-buttons">
          <button class="btn btn-edit" (click)="startEdit(todo)">Edit</button>
          <button class="btn btn-delete" (click)="deleteTodo(todo.id)">Delete</button>
        </div>
      </ng-container>

      <ng-container *ngIf="editingId === todo.id">
        <div class="edit-form">
          <div class="form-group">
            <label>Title <span class="required">*</span></label>
            <input type="text" [(ngModel)]="editTitle" placeholder="Task title" [class.input-error]="editTitleError" />
            <small class="error-msg" *ngIf="editTitleError">{{ editTitleError }}</small>
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" [(ngModel)]="editDescription" placeholder="Description" />
          </div>
          <div class="form-group">
            <label>Due Date <span class="required">*</span></label>
            <input type="date" [(ngModel)]="editDueDate" [class.input-error]="editDueDateError" />
            <small class="error-msg" *ngIf="editDueDateError">{{ editDueDateError }}</small>
          </div>
          <div class="edit-actions">
            <button class="btn btn-primary" (click)="saveEdit(todo)">Save</button>
            <button class="btn btn-cancel" (click)="cancelEdit()">Cancel</button>
          </div>
        </div>
      </ng-container>

    </div>
  </div>

</div>
